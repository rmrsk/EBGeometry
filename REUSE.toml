# SPDX-License-Identifier: GPL-3.0-or-later
#
# Bulk licensing for files that cannot carry an inline SPDX header (data,
# images, JSON) or where a per-file header would be noise (build/config/docs).
# Source code carries inline SPDX headers instead; see Source/ and Examples/*/main.cpp.
#
# NOTE: third-party example meshes are no longer redistributed here; they are pulled in
# via the common-3d-test-models git submodule at the repository root (a separate repository
# with its own licensing, which REUSE does not descend into).

version = 1

# Top-level build and repository configuration
[[annotations]]
path = [
  ".clang-format",
  ".codespellignore",
  ".gitignore",
  ".gitmodules",
  ".pre-commit-config.yaml",
  "CMakeLists.txt",
  "CMakePresets.json",
  "CLAUDE.md",
  "Scripts/CheckDocs.py",
  "Copyright.txt",
  "README.md",
  "TODO.md",
  "NOTES-particle-soa.md",
]
SPDX-FileCopyrightText = "2022 Robert Marskar <robert.marskar@sintef.no>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# GitHub metadata and workflows
[[annotations]]
path = ".github/**"
SPDX-FileCopyrightText = "2022 Robert Marskar <robert.marskar@sintef.no>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Documentation: Sphinx sources, figures (.png/.tex), and config
[[annotations]]
path = "Docs/**"
SPDX-FileCopyrightText = "2022 Robert Marskar <robert.marskar@sintef.no>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Example build files and per-example documentation
# (deliberately excludes Examples/Resources/ data and main.cpp, which are handled elsewhere)
[[annotations]]
path = [
  "Examples/CMakeLists.txt",
  "Examples/README.md",
  "Examples/**/GNUmakefile",
  "Examples/**/Make.package",
  "Examples/**/*.inputs",
  "Examples/**/README.md",
]
SPDX-FileCopyrightText = "2022 Robert Marskar <robert.marskar@sintef.no>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Third-party integration examples (AMReX, Chombo): build files and per-example
# documentation. main.cpp files carry their own inline SPDX headers.
[[annotations]]
path = [
  "ThirdParty/README.md",
  "ThirdParty/**/GNUmakefile",
  "ThirdParty/**/Make.package",
  "ThirdParty/**/*.inputs",
  "ThirdParty/**/README.md",
]
SPDX-FileCopyrightText = "2022 Robert Marskar <robert.marskar@sintef.no>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Tests: build files and the small self-authored test fixture mesh
[[annotations]]
path = [
  "Tests/CMakeLists.txt",
  "Tests/data/**",
]
SPDX-FileCopyrightText = "2022 Robert Marskar <robert.marskar@sintef.no>"
SPDX-License-Identifier = "GPL-3.0-or-later"
