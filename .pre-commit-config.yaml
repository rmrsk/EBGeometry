ci:
  skip: [doxygen-check, sphinx-build]

repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.8
    hooks:
      - id: clang-format
        name: Format source files (clang-format)
        types_or: [c++, c]

  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.1.0
    hooks:
      - id: reuse

  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        files: ^(Source|Docs|Exec)/
        args:
          - "--ignore-words=.codespellignore"
          - "--skip=*.bib,*.js,*.log,Docs/Sphinx/build,Docs/doxygen"

  # NOTE: static analysis of the header-only library is done with clang-tidy (see
  # .clang-tidy and the Static-analysis CI job). The old cppcheck hook only matched
  # Source/**.cpp, of which there are none, so it never ran and has been removed.
  - repo: local
    hooks:
      - id: doxygen-check
        name: Check doxygen documentation (warnings as errors)
        entry: bash -c "cd Docs && doxygen doxygen.conf"
        language: system
        pass_filenames: false
        files: \.(H|cpp)$

      - id: sphinx-build
        name: Build Sphinx documentation (warnings as errors)
        entry: sphinx-build
        args: [-W, --keep-going, -E, -b, html, Docs/Sphinx/source, Docs/Sphinx/build/html]
        language: python
        additional_dependencies:
          - "sphinx==5.0.0"
          - sphinx-rtd-theme
          - sphinxcontrib-bibtex
        pass_filenames: false
        stages: [manual]
